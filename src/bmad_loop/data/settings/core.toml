# Core settings schema — presentation + widget hints for .bmad-loop/policy.toml.
#
# This file describes HOW each policy key is rendered in the settings UI (widget
# kind, label, help text, select options, numeric bounds). It is NOT the source
# of truth for defaults or validation: policy.py's frozen dataclasses are. So
# defaults and select options are *referenced* from policy, never literal-ed:
#
#   default_ref = "ScmPolicy.merge_strategy"   ->  getattr(policy.ScmPolicy, "merge_strategy")
#   options_ref = "MERGE_STRATEGIES"           ->  tuple(sorted(policy.MERGE_STRATEGIES))
#
# A sync test asserts every resolved default/option matches the dataclass, so
# this file can never silently drift from the runtime model. Section and field
# order here IS the render order in the settings screen.
#
# field.kind is the widget hint: select | int | float | str | switch | lines | args
# (lines = newline-separated list; args = shlex token list with an override toggle).

[[section]]
name = "gates"
description = "approval gates, escalation & retrospective behavior"
[[section.field]]
key = "mode"
kind = "select"
options_ref = "GATE_MODES"
default_ref = "GatesPolicy.mode"
[[section.field]]
key = "retrospective"
kind = "select"
options_ref = "RETRO_MODES"
default_ref = "GatesPolicy.retrospective"

[[section]]
name = "review"
description = "separate adversarial review session toggle"
[[section.field]]
key = "enabled"
kind = "switch"
default_ref = "ReviewPolicy.enabled"
label = "separate review session"
description = "ON: adversarial review runs in a dedicated 2nd session · OFF: the dev pass runs its own review layers inline, story straight to done"
[[section.field]]
key = "trigger"
kind = "select"
options_ref = "REVIEW_TRIGGER_MODES"
default_ref = "ReviewPolicy.trigger"
label = "review trigger"
description = "recommended: run the 2nd-opinion review only when bmad-dev-auto flags it · always: run it every story (both bounded by limits.max_review_cycles)"

[[section]]
name = "stories"
description = "story-queue source: classic sprint board vs. folder+id dispatch"
[[section.field]]
key = "source"
kind = "select"
options_ref = "STORIES_SOURCES"
default_ref = "StoriesPolicy.source"
label = "story source"
description = "sprint-status: walk sprint-status.yaml · stories: folder+id dispatch off a typed stories.yaml (needs spec_folder)"
[[section.field]]
key = "spec_folder"
kind = "str"
default_ref = "StoriesPolicy.spec_folder"
label = "spec folder"
description = "stories mode only: project-relative path to the epic spec folder (holds stories.yaml + SPEC.md)"

[[section]]
name = "limits"
description = "cycle/attempt caps, timeout & token budget"
[[section.field]]
key = "max_review_cycles"
kind = "int"
minimum = 1
default_ref = "LimitsPolicy.max_review_cycles"
[[section.field]]
key = "max_dev_attempts"
kind = "int"
minimum = 1
default_ref = "LimitsPolicy.max_dev_attempts"
[[section.field]]
key = "max_followup_reviews"
kind = "int"
minimum = 0
default_ref = "LimitsPolicy.max_followup_reviews"
description = "additional review rounds granted solely because a finalized (status: done) round still recommended a follow-up; once spent, such a round converges + refiles the recommendation instead of burning another cycle · 0 = never honor a pass's own recommendation"
[[section.field]]
key = "session_timeout_min"
kind = "int"
minimum = 1
default_ref = "LimitsPolicy.session_timeout_min"
[[section.field]]
key = "stop_without_result_nudges"
kind = "int"
minimum = 0
default_ref = "LimitsPolicy.stop_without_result_nudges"
[[section.field]]
key = "dev_stall_grace_s"
kind = "int"
minimum = 0
default_ref = "LimitsPolicy.dev_stall_grace_s"
description = "grace for a dev session that ended its turn awaiting a background process (e.g. a slow PlayMode/test run) before it is called stalled; each re-invocation resets it · 0 = fail fast on the first result-less Stop"
[[section.field]]
key = "dev_stall_nudges"
kind = "int"
minimum = 0
default_ref = "LimitsPolicy.dev_stall_nudges"
description = "times an idle dev session is nudged awake on grace expiry before it is called stalled (bmad-loop has no background-completion re-invocation); pane output re-arms the grace window and a fresh Stop restores the budget · 0 = stall on grace expiry"
[[section.field]]
key = "dev_stall_nudges_cap"
kind = "int"
minimum = 0
default_ref = "LimitsPolicy.dev_stall_nudges_cap"
description = "total (never-restored) stall nudges for a dev/review session before it is called stalled; bounds a session whose reply to the wake nudge is itself a result-less Stop that would refill the budget forever · 0 = stall on first grace expiry"
[[section.field]]
key = "workflow_stall_nudges_cap"
kind = "int"
minimum = 0
default_ref = "LimitsPolicy.workflow_stall_nudges_cap"
description = "total (never-restored) stall nudges for an injected plugin-workflow session before it is called stalled; bounds a session that finished its work but never wrote its completion marker · 0 = stall on first grace expiry"
[[section.field]]
key = "max_tokens_per_story"
kind = "int"
minimum = 1
default_ref = "LimitsPolicy.max_tokens_per_story"
[[section.field]]
key = "cache_read_weight"
kind = "float"
minimum = 0.0
maximum = 1.0
default_ref = "LimitsPolicy.cache_read_weight"

[[section]]
name = "verify"
description = "post-implementation verification commands"
[[section.field]]
key = "commands"
kind = "lines"

[[section]]
name = "notify"
description = "desktop & file notifications"
[[section.field]]
key = "desktop"
kind = "switch"
default_ref = "NotifyPolicy.desktop"
[[section.field]]
key = "file"
kind = "switch"
default_ref = "NotifyPolicy.file"

[[section]]
name = "adapter"
description = "CLI client, model & bypass flags (base for all stages)"
[[section.field]]
key = "name"
kind = "str"
placeholder = "CLI profile — default: claude"
[[section.field]]
key = "model"
kind = "str"
placeholder = "CLI default model"
[[section.field]]
key = "extra_args"
kind = "args"
[[section.field]]
key = "cleanup_session_on_finish"
kind = "switch"
default_ref = "AdapterPolicy.cleanup_session_on_finish"
[[section.field]]
key = "usage_grace_s"
kind = "float"
minimum = 0
default_ref = "AdapterPolicy.usage_grace_s"
placeholder = "inherit from CLI profile (copilot ships 8s)"
description = "seconds to poll the transcript for token usage after a session ends; CLIs that flush totals on shutdown (copilot) need a grace"
[[section.field]]
key = "stop_without_result_nudges"
kind = "int"
minimum = 0
default_ref = "AdapterPolicy.stop_without_result_nudges"
placeholder = "inherit (copilot profile ships 5)"
description = "result-less Stop signals tolerated before a session is called stalled; overrides the global limits value for this CLI"

# Per-stage adapter overrides. One section per [adapter.dev|review|triage] table,
# expanded from this single template by the STAGES loop so they never drift.
[[section]]
name = "adapter.{stage}"
expand_stages = true
description = "{stage}-stage adapter overrides"
[[section.field]]
key = "name"
kind = "str"
placeholder = "inherit from [adapter]"
[[section.field]]
key = "model"
kind = "str"
placeholder = "inherit / client default"
[[section.field]]
key = "extra_args"
kind = "args"
[[section.field]]
key = "usage_grace_s"
kind = "float"
minimum = 0
default_ref = "StageAdapterPolicy.usage_grace_s"
placeholder = "inherit from [adapter]"
[[section.field]]
key = "stop_without_result_nudges"
kind = "int"
minimum = 0
default_ref = "StageAdapterPolicy.stop_without_result_nudges"
placeholder = "inherit from [adapter]"

[[section]]
name = "sweep"
description = "deferred-work sweep automation"
[[section.field]]
key = "auto"
kind = "select"
options_ref = "SWEEP_AUTO_MODES"
default_ref = "SweepPolicy.auto"
[[section.field]]
key = "max_bundles"
kind = "int"
minimum = 1
default_ref = "SweepPolicy.max_bundles"
[[section.field]]
key = "max_triage_attempts"
kind = "int"
minimum = 1
default_ref = "SweepPolicy.max_triage_attempts"
[[section.field]]
key = "repeat"
kind = "switch"
default_ref = "SweepPolicy.repeat"
[[section.field]]
key = "max_cycles"
kind = "int"
minimum = 1
default_ref = "SweepPolicy.max_cycles"

[[section]]
name = "scm"
description = "git isolation, branching & merge-back"
[[section.field]]
key = "isolation"
kind = "select"
options_ref = "ISOLATION_MODES"
default_ref = "ScmPolicy.isolation"
description = "none: work in place on the checked-out branch (default) · worktree: run each story in its own git worktree, merge back to the target branch"
[[section.field]]
key = "branch_per"
kind = "select"
options_ref = "BRANCH_PER_MODES"
default_ref = "ScmPolicy.branch_per"
description = "worktree mode: one branch per story, or one shared branch per run (run forces delete-branch off so the shared branch survives)"
[[section.field]]
key = "target_branch"
kind = "str"
placeholder = "default: the branch checked out at run start"
description = "worktree mode: branch all units merge back into (created if missing)"
[[section.field]]
key = "merge_strategy"
kind = "select"
options_ref = "MERGE_STRATEGIES"
default_ref = "ScmPolicy.merge_strategy"
description = "worktree mode: how a unit branch lands on the target — ff, merge, or squash"
[[section.field]]
key = "delete_branch"
kind = "switch"
default_ref = "ScmPolicy.delete_branch"
description = "worktree mode: delete the unit branch after a successful merge"
[[section.field]]
key = "keep_failed"
kind = "switch"
default_ref = "ScmPolicy.keep_failed"
description = "worktree mode: keep a failed unit's worktree + branch mounted for inspection"
[[section.field]]
key = "rollback_on_failure"
kind = "switch"
default_ref = "ScmPolicy.rollback_on_failure"
label = "auto-rollback failed attempts"
description = "⚠ in-place mode (isolation=none): when ON, a failed attempt's tracked changes are auto-reverted and the untracked files this run created are deleted (its uncommitted work is lost). When OFF (default), the orchestrator never touches your tree — it pauses with manual recovery steps. Governs unattended/stopped attempts only: a resolved escalation's re-drive always auto-recovers regardless (reverts the failed source, keeps the corrected spec). Prefer isolation=worktree to keep failures off your main checkout."
[[section.field]]
key = "preserve_keep"
kind = "int"
minimum = 0
default_ref = "ScmPolicy.preserve_keep"
label = "preserve-ref retention"
description = "attempt-preserve/* recovery branches and attempt-preserve-dirty/* worktree snapshots kept at each run start (per family) · the newest by committer date survive and the tail is deleted (0 = never prune)"
[[section.field]]
key = "seed_adapter_defaults"
kind = "switch"
default_ref = "ScmPolicy.seed_adapter_defaults"
label = "seed adapter configs"
description = "worktree mode: copy each loaded adapter's gitignored MCP/CLI configs (.mcp.json, .claude/settings.json, .codex/config.toml …) into the worktree so isolated sessions can reach their MCP server"
[[section.field]]
key = "worktree_seed"
kind = "lines"
label = "extra worktree seed files"
description = "worktree mode: additional project-relative gitignored files to copy into each worktree, one per line — on top of the adapter defaults above"
[[section.field]]
key = "commit_message_template"
kind = "str"
placeholder = "blank = built-in default; {story_key} / {run_id} substituted"
label = "commit message template"
description = "commit message dev sessions use for a story/bundle commit when set"
[[section.field]]
key = "failed_diff_max_mb"
kind = "int"
minimum = 1
default_ref = "ScmPolicy.failed_diff_max_mb"
label = "failed-diff size cap (MB)"
description = "per-file size limit for untracked files captured into a kept-failed unit's changes.patch · oversized files are skipped with a marker"
[[section.field]]
key = "failed_diff_unlimited"
kind = "switch"
default_ref = "ScmPolicy.failed_diff_unlimited"
label = "uncap failed-diff size"
description = "⚠ ON: capture failed-unit diffs with NO size limit (overrides the cap above) — may produce very large patches; a warning is logged when active"

[[section]]
name = "cleanup"
description = "disk reclamation for .bmad-loop/runs (terminal runs only)"
[[section.field]]
key = "run_retention"
kind = "int"
minimum = 0
default_ref = "CleanupPolicy.run_retention"
label = "run retention (count)"
description = "newest concluded runs kept whole · older ones are trimmed or archived by `bmad-loop clean` (0 = keep none by count)"
[[section.field]]
key = "retention_days"
kind = "int"
minimum = 0
default_ref = "CleanupPolicy.retention_days"
label = "run retention (days)"
description = "0 = disabled · else also keep runs newer than N days regardless of the count above"
[[section.field]]
key = "trim_artifacts"
kind = "switch"
default_ref = "CleanupPolicy.trim_artifacts"
label = "trim heavy artifacts"
description = "drop the heavy worktrees/ tree from concluded runs · the run still lists in the dashboard with full status/journal/logs"
[[section.field]]
key = "archive_old"
kind = "switch"
default_ref = "CleanupPolicy.archive_old"
label = "archive past the window"
description = "archive (.bmad-loop/archive/<id>.tar.gz) rather than permanently delete runs beyond the retention window"
[[section.field]]
key = "auto_clean_on_finish"
kind = "switch"
default_ref = "CleanupPolicy.auto_clean_on_finish"
label = "auto-clean on finish"
description = "reconcile worktrees leaked by a mid-flight stop + apply retention each time a run finishes cleanly"
[[section.field]]
key = "clean_tmp"
kind = "switch"
default_ref = "CleanupPolicy.clean_tmp"
label = "clean plugin /tmp scratch"
description = "let engine plugins clean their /tmp scratch on finish (e.g. the Unity MCP server's downloaded zips)"

# The game-engine layer (Unity) is no longer a core section — it is a plugin.
# Its settings render from the plugin's own schema (data/plugins/unity/plugin.toml)
# under [plugins.unity] when "unity" is in [plugins] enabled.

[[section]]
name = "tui"
description = "dashboard rendering (slow-link / SSH tuning)"
[[section.field]]
key = "low_frame_rate"
kind = "switch"
default_ref = "TuiPolicy.low_frame_rate"
label = "low frame rate"
description = "cap to 15fps + disable animations — fixes repaint tearing/garbage over slow or SSH links · takes effect next time the TUI launches"

[[section]]
name = "mux"
description = "terminal-multiplexer backend (machine-specific — policy.toml is gitignored)"
# options are injected at build-registry time from detect_multiplexers() (plus any
# already-forced value), since registered backends are a runtime fact, not an enum.
[[section.field]]
key = "backend"
kind = "select"
default_ref = "MuxPolicy.backend"
label = "backend"
description = "force a registered transport backend by name (see `bmad-loop mux`); leave blank to auto-select — BMAD_LOOP_MUX_BACKEND outranks it · takes effect on the next bmad-loop invocation"
