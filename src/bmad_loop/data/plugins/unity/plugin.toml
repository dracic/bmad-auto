# Bundled Unity game-engine plugin for bmad-loop.
#
# This is the proof that the plugin framework is general enough to carry the
# whole game-engine layer with no engine-specific code in core. Unity drives a
# project whose dev/sweep cycle needs a live Editor + MCP bridge.
#
# Opt in from .bmad-loop/policy.toml:
#   [plugins]
#   enabled = ["unity"]          # [python] module loads only when enabled
#
#   [plugins.unity]
#   editor_mode = "shared"       # shared (live Editor, isolation=none)
#                                # | per_worktree (one Editor per worktree, isolation=worktree)
#   mcp = "ivanmurzak"           # ivanmurzak | coplaydev
#
# Override per project by copying this dir to .bmad-loop/plugins/unity/ and
# editing it (the project-local copy wins, and its dir becomes {scripts}).
#
# Scene auto-save guard: Unity-MCP GameObject tools mark scenes dirty but never
# save, so a shared editor's scene sits chronically dirty — and that dirty state
# is what raises the two run-stalling modal dialogs (scene-changed-on-disk reload,
# and save-before-quit), which freeze the MCP dispatch loop. This plugin seeds an
# editor-only auto-save guard (Assets/BmadLoop/Editor/, from unity_assets/) into
# the project so no such modal ever appears. The seeded guard is committed into
# the consumer project by story-finalize's `git add -A` — that is intended (the
# guard travels with the repo). Disable with install_scene_guard = false.

[plugin]
name = "unity"
version = "1.0.0"
api_version = 1
description = "Drive a Unity project whose dev/sweep cycle needs a live Editor + MCP bridge."
author = "bmad-loop"
# MCP-generated skills are gitignored; seed them into per_worktree checkouts so
# the agent's CLI can reach the worktree Editor's tools.
seed_globs = [".claude/skills/*"]

# The in-process module owns the engine glue: the readiness gate, per_worktree
# Editor setup/teardown, MCP agent routing, Library priming, and the
# editor_mode<->scm.isolation coupling validation. It hooks the engine's
# lifecycle stages (pre_ready_gate / pre_worktree_setup / pre_worktree_teardown)
# and vetoes (defers) the unit when the Editor can't be made ready.
[python]
module = "unity_plugin.py"
class = "UnityPlugin"

[[settings]]
key = "editor_mode"
type = "select"
options = ["shared", "per_worktree"]
default = "shared"
label = "Editor mode"
help = "shared = agent works in place on the live Editor's checkout (requires scm.isolation = none); per_worktree = one managed Editor per worktree (requires scm.isolation = worktree)"

[[settings]]
key = "mcp"
type = "select"
options = ["ivanmurzak", "coplaydev"]
default = "ivanmurzak"
label = "Editor MCP"
help = "which Editor MCP server the scripts target"

[[settings]]
key = "unity_path"
type = "str"
default = ""
label = "Unity editor path"
help = "Editor binary used to launch a per_worktree Editor; '' auto-detects. Ignored in shared mode."

[[settings]]
key = "ready_timeout_sec"
type = "int"
default = 600
min = 1
label = "Readiness timeout (sec)"
help = "how long the readiness gate blocks for the Editor + MCP to come up"

[[settings]]
key = "ready_grace_sec"
type = "int"
default = -1
label = "Readiness grace (sec)"
help = "seconds to wait before the first readiness probe (-1 = auto: per_worktree waits for a cold Editor, shared does not)"

[[settings]]
key = "install_scene_guard"
type = "bool"
default = true
label = "Install scene auto-save guard"
help = "seed an editor-only auto-save guard into the project so chronically-dirty scenes never raise the run-stalling scene-changed-on-disk / save-before-quit modal dialogs. The seeded guard is committed into the consumer project by story-finalize's git add -A (intended). false disables seeding."

[[settings]]
key = "scene_guard_dir"
type = "str"
default = "Assets/BmadLoop/Editor"
label = "Scene guard install dir"
help = "project-relative dir the scene auto-save guard is seeded into (must live under the project's asset root, e.g. Assets/)"
